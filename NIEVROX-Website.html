<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="root"></div>
<div id="NIEVROX-auth-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, memo } = React;
        const _FM = window.Motion || {};
        const motion          = _FM.motion          || 'div';
        const AnimatePresence = _FM.AnimatePresence || (({ children }) => children);
        const useInView       = _FM.useInView       || (() => true);
        const THREE = window.THREE;
        const { gsap, ScrollTrigger } = window;
        gsap.registerPlugin(ScrollTrigger);

        // --- LASER FLOW SHADER (OPTIMIZED) ---
        const VERT = `precision highp float; attribute vec3 position; void main(){ gl_Position = vec4(position, 1.0); }`;
        const FRAG_LASER = `
        #ifdef GL_ES
        #extension GL_OES_standard_derivatives : enable
        #endif
        precision mediump float; 
        uniform float iTime; uniform vec3 iResolution; uniform float uWispDensity; uniform float uFlowTime; uniform float uBeamXFrac; uniform float uBeamYFrac; uniform float uFlowSpeed; uniform float uVLenFactor; uniform float uHLenFactor; uniform float uFogIntensity; uniform float uWSpeed; uniform float uWIntensity; uniform float uFlowStrength; uniform float uDecay; uniform float uFalloffStart; uniform vec3 uColor; uniform float uFade;
        #define PI 3.14159265359
        #define TWO_PI 6.28318530718
        #define EPS 1e-6
        #define EDGE_SOFT 0.0152
        #define DT_LOCAL 0.0038
        #define TAP_RADIUS 2 
        #define R_H 150.0
        #define R_V 150.0
        #define FLARE_HEIGHT 16.0
        #define FLARE_AMOUNT 8.0
        #define FLARE_EXP 2.0
        #define TOP_FADE_START 0.1
        #define TOP_FADE_EXP 1.0
        #define FLOW_PERIOD 0.5
        #define FLOW_SHARPNESS 1.5
        #define W_BASE_X 1.5
        #define W_LAYER_GAP 0.25
        #define W_LANES 5
        #define W_SIDE_DECAY 0.5
        #define W_HALF 0.01
        #define W_AA 0.15
        #define W_CELL 20.0
        #define W_SEG_MIN 0.01
        #define W_SEG_MAX 0.55
        #define W_CURVE_AMOUNT 15.0
        #define W_CURVE_RANGE 13.0
        #define W_BOTTOM_EXP 10.0
        float g(float x){return x<=0.00031308?12.92*x:1.055*pow(x,1.0/2.4)-0.055;}
        float bs(vec2 p,vec2 q,float powr){ float d=distance(p,q),f=powr*uFalloffStart,r=(f*f)/(d*d+EPS); return powr*min(1.0,r); }
        float bsa(vec2 p,vec2 q,float powr,vec2 s){ vec2 d=p-q; float dd=(d.x*d.x)/(s.x*s.x)+(d.y*d.y)/(s.y*s.y),f=powr*uFalloffStart,r=(f*f)/(dd+EPS); return powr*min(1.0,r); }
        float tri01(float x){float f=fract(x);return 1.0-abs(f*2.0-1.0);}
        float tauWf(float t,float tmin,float tmax){float a=smoothstep(tmin,tmin+EDGE_SOFT,t),b=1.0-smoothstep(tmax-EDGE_SOFT,tmax,t);return max(0.0,a*b);} 
        float h21(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+34.123);return fract(p.x*p.y);}
        float rGate(float x,float l){float a=smoothstep(0.0,W_AA,x),b=1.0-smoothstep(l,l+W_AA,x);return max(0.0,a*b);}
        float flareY(float y){float t=clamp(1.0-(clamp(y,0.0,FLARE_HEIGHT)/max(FLARE_HEIGHT,EPS)),0.0,1.0);return pow(t,FLARE_EXP);}
        float vWisps(vec2 uv,float topF){ float y=uv.y,yf=(y+uFlowTime*uWSpeed)/W_CELL; float d=max(uWispDensity,1.0); int lanes=int(max(1.0,floor(float(W_LANES)*min(d,1.0)))); float sum=0.0;
            float fm=flareY(max(y,0.0)),rm=clamp(1.0-(y/max(W_CURVE_RANGE,EPS)),0.0,1.0),cm=fm*rm; float xS=1.0+(FLARE_AMOUNT*W_CURVE_AMOUNT*0.05)*cm;
            float bGain=pow(1.0-clamp(y/R_V,0.0,1.0),W_BOTTOM_EXP);
            for(int s=0;s<2;++s){ float sgn=s==0?-1.0:1.0;
                for(int i=0;i<W_LANES;++i){ if(i>=lanes) break; float off=W_BASE_X+float(i)*W_LAYER_GAP,xc=sgn*(off*xS); float dx=abs(uv.x-xc),lat=1.0-smoothstep(W_HALF,W_HALF+W_AA,dx),amp=exp(-off*W_SIDE_DECAY);
                    float seed=h21(vec2(off,sgn*17.0)),yf2=yf+seed*7.0,ci=floor(yf2),fy=fract(yf2); float seg=mix(W_SEG_MIN,W_SEG_MAX,h21(vec2(ci,off*2.3))); float spR=h21(vec2(ci,off+sgn*31.0));
                    sum+=amp*lat*rGate(fy,seg)*step(spR,min(d,1.0)); } }
            return uWIntensity*sum*topF*bGain*smoothstep(-3.0,0.0,y)*(1.0-smoothstep(R_V-6.0,R_V,y)); }
        void mainImage(out vec4 fc,in vec2 frag){
            vec2 C=iResolution.xy*.5; float sc=512.0/iResolution.x*.4; vec2 uv=(frag-C)*sc,uvc=uv-vec2(uBeamXFrac*iResolution.x*sc,uBeamYFrac*iResolution.y*sc);
            float a=0.0,b=0.0; float basePhase=1.5*PI+uDecay*.5,tauMin=basePhase-uDecay,tauMax=basePhase;
            float cx=clamp(uvc.x/(R_H*uHLenFactor),-1.0,1.0),tH=clamp(TWO_PI-acos(cx),tauMin,tauMax);
            for(int k=-TAP_RADIUS;k<=TAP_RADIUS;++k){ float tu=tH+float(k)*DT_LOCAL,wt=tauWf(tu,tauMin,tauMax); if(wt<=0.0) continue; float spd=max(abs(sin(tu)),0.02),u=clamp((basePhase-tu)/max(uDecay,EPS),0.0,1.0); a+=wt*bs(uvc,vec2((R_H*uHLenFactor)*cos(tu),0.0),pow(1.0-abs(u*2.0-1.0),0.8)*spd); }
            float yPix=uvc.y,cy=clamp(-yPix/(R_V*uVLenFactor),-1.0,1.0),tV=clamp(TWO_PI-acos(cy),tauMin,tauMax);
            for(int k=-TAP_RADIUS;k<=TAP_RADIUS;++k){ float tu=tV+float(k)*DT_LOCAL,wt=tauWf(tu,tauMin,tauMax); if(wt<=0.0) continue; float yb=(-R_V)*cos(tu),s=clamp(yb/R_V,0.0,1.0),spd=max(abs(sin(tu)),0.02);
                float env=pow(1.0-s,0.6)*spd*pow(1.0-smoothstep(TOP_FADE_START,1.0,s),TOP_FADE_EXP); env*=mix(1.0-uFlowStrength,1.0,pow(tri01(s/max(FLOW_PERIOD,EPS)+uFlowTime*uFlowSpeed),FLOW_SHARPNESS));
                float yp=(-R_V*uVLenFactor)*cos(tu),m=pow(smoothstep(FLARE_HEIGHT,0.0,yp),FLARE_EXP); b+=wt*bsa(uvc,vec2(0.0,yp),step(0.0,yp)*env,vec2(1.0+FLARE_AMOUNT*m,1.0)); }
            float topA=pow(1.0-smoothstep(TOP_FADE_START,1.0,clamp(yPix/R_V,0.0,1.0)),TOP_FADE_EXP); float L=a+b*topA,w=vWisps(vec2(uvc.x,yPix),topA);
            vec3 col=g(L+w)*uColor; float alpha=clamp(g(L+w*0.6),0.0,1.0);
            fc=vec4(col,alpha)*uFade;
        }
        void main(){ vec4 fc; mainImage(fc, gl_FragCoord.xy); gl_FragColor = fc; }
        `;

        // Memoized to prevent re-renders on state change
        const LaserFlow = memo(({ wispDensity=1, horizontalBeamOffset=0.1, verticalBeamOffset=0.0, flowSpeed=0.35, verticalSizing=2.0, horizontalSizing=0.5, wispSpeed=15.0, wispIntensity=5.0, flowStrength=0.25, decay=1.1, falloffStart=1.2, color='#A855F7' }) => {
            const mountRef = useRef(null);
            const hexToRGB = hex => {
                let c = hex.trim(); if(c[0]==='#') c=c.slice(1);
                if(c.length===3) c=c.split('').map(x=>x+x).join('');
                const n=parseInt(c,16)||0xffffff; return {r:((n>>16)&255)/255,g:((n>>8)&255)/255,b:(n&255)/255};
            };

            useEffect(()=>{
                if(!mountRef.current) return;
                const mount = mountRef.current;
                const renderer = new THREE.WebGLRenderer({ antialias:false, alpha:true, powerPreference:'high-performance' });
                renderer.setPixelRatio(1); 
                renderer.setSize(mount.clientWidth, mount.clientHeight);
                mount.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array([-1,-1,0, 3,-1,0, -1,3,0]),3));
                const uniforms = {
                    iTime:{value:0}, iResolution:{value:new THREE.Vector3(mount.clientWidth,mount.clientHeight,1)},
                    uWispDensity:{value:wispDensity}, uFlowTime:{value:0},
                    uBeamXFrac:{value:horizontalBeamOffset}, uBeamYFrac:{value:verticalBeamOffset},
                    uFlowSpeed:{value:flowSpeed}, uVLenFactor:{value:verticalSizing}, uHLenFactor:{value:horizontalSizing},
                    uWSpeed:{value:wispSpeed},
                    uWIntensity:{value:wispIntensity}, uFlowStrength:{value:flowStrength}, uDecay:{value:decay},
                    uFalloffStart:{value:falloffStart}, uColor:{value:new THREE.Vector3()}, uFade:{value:0}
                };
                const material = new THREE.RawShaderMaterial({ vertexShader:VERT, fragmentShader:FRAG_LASER, uniforms, transparent:true, depthTest:false, blending:THREE.AdditiveBlending });
                const mesh = new THREE.Mesh(geometry, material); scene.add(mesh);
                const clock = new THREE.Clock(); let raf=0;

                const animate = () => {
                    raf = requestAnimationFrame(animate);
                    const dt = clock.getDelta();
                    uniforms.iTime.value = clock.getElapsedTime();
                    uniforms.uFlowTime.value += dt;
                    if(uniforms.uFade.value < 1) uniforms.uFade.value += dt * 0.5;
                    renderer.render(scene, camera);
                };
                animate();
                const {r,g,b} = hexToRGB(color); uniforms.uColor.value.set(r,g,b);
                const resize = () => { if(mount){ renderer.setSize(mount.clientWidth, mount.clientHeight); uniforms.iResolution.value.set(mount.clientWidth, mount.clientHeight, 1); } };
                window.addEventListener('resize', resize);
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); if(renderer && mount) mount.removeChild(renderer.domElement); geometry.dispose(); material.dispose(); renderer.dispose(); };
            },[]);
            return <div ref={mountRef} className="laser-flow-container" />;
        });

        // Memoized to prevent re-renders on inputs
        const GhostCursor = memo(({ trailLength = 20, inertia = 0.92, bloomStrength = 0.1, bloomRadius = 0.5, bloomThreshold = 0.1, brightness = 0.30, color = '#B19EEF' }) => {
            const mountRef = useRef(null);
            const trailBufRef = useRef(Array.from({ length: 30 }, () => new THREE.Vector2(0.5, 0.5)));
            const headRef = useRef(0);
            const currentMouseRef = useRef(new THREE.Vector2(0.5, 0.5));
            const velocityRef = useRef(new THREE.Vector2(0, 0));
            const fadeOpacityRef = useRef(1.0);
            const lastMoveTimeRef = useRef(Date.now());

            useEffect(() => {
                const mount = mountRef.current;
                const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
                renderer.setPixelRatio(1);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setClearColor(0x000000, 0);
                mount.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // ─── REGION SELECTOR COMPONENT (CLEAN DROPDOWN) ───────────────
        function RegionSelector({ region, lang, onRegion, onLang }) {
            const [open, setOpen] = useState(false);
            const ref = useRef(null);
            const currentRegion = REGIONS[region];
            const langs = Object.keys(currentRegion.languages);
            
            useEffect(() => {
                const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            return (
                <motion.div 
                    initial={{opacity:0, y:-20}} animate={{opacity:1, y:0}} transition={{duration:0.6, delay:0.3}}
                    ref={ref}
                    style={{ position:'fixed', top:20, right:20, zIndex:500, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:8 }}
                >
                    <button className="region-dropdown-btn" onClick={()=>setOpen(o=>!o)}>
                        <span style={{fontSize:18}}>{currentRegion.flag}</span>
                        <span>{currentRegion.label}</span>
                        <span style={{color:'#A855F7', fontSize:11, marginLeft:2}}>({currentRegion.currency})</span>
                        <span style={{color:'rgba(168,85,247,0.7)', fontSize:10, marginLeft:4}}>{open?'▲':'▼'}</span>
                    </button>
                    
                    {open && (
                        <div className="region-dropdown-panel">
                            <p style={{color:'rgba(168,85,247,0.7)', fontSize:9, fontWeight:700, textTransform:'uppercase', letterSpacing:'1.2px', padding:'4px 12px 8px', fontFamily:"'Space Grotesk', sans-serif"}}>Select Region</p>
                            {Object.entries(REGIONS).map(([key, r]) => (
                                <div key={key} onClick={()=>{ onRegion(key); onLang(Object.keys(REGIONS[key].languages)[0]); setOpen(false); }} className={`region-option ${region===key?'active':''}`}>
                                    <span style={{fontSize:20}}>{r.flag}</span>
                                    <span>{r.label}</span>
                                    <span className="currency-tag">{r.currency}</span>
                                </div>
                            ))}
                        </div>
                    )}
                    
                    {(langs || []).length > 1 && (
                        <div style={{display:'flex', gap:6}}>
                            {langs.map(l => (
                                <button key={l} onClick={()=>onLang(l)} className={`lang-pill ${lang===l?'active':''}`}>
                                    {currentRegion.languages[l].label}
                                </button>
                            ))}
                        </div>
                    )}
                </motion.div>
            );
        }

        function ScrollReveal({ children, direction = "up", delay = 0 }) { 
            const ref = useRef(null); 
            const isInView = useInView(ref, { once: false, margin: "-10% 0px" }); 
            let initial = { opacity: 0, x: 0, y: 0 }; 
            
            if (direction === "left") initial.x = -150; 
            else if (direction === "right") initial.x = 150; 
            else if (direction === "up") initial.y = 100;
            else if (direction === "down") initial.y = -100;

            return (

// NIEVROX AUTH FLOW — Login / Signup / Onboarding Entry Gate
// ═══════════════════════════════════════════════════════════════════════════

// PHASE-1: API base — auto-detects localhost vs production
const API = 'http://localhost:5000/api';

async function apiCall(method, path, body) {
  const session = JSON.parse(localStorage.getItem('NIEVROX_session') || '{}');

  const opts = {
    method,
    credentials: 'include',
    headers: {
      'Content-Type': 'application/json',
      ...(session.token ? { Authorization: 'Bearer ' + session.token } : {})
    }
  };

  if (body) opts.body = JSON.stringify(body);

  const res = await fetch(API + path, opts);
  const data = await res.json();

  if (!res.ok) throw new Error(data.error || 'Request failed');

  return data;
}

// Global state
window._NIEVROXAuthState = { open: false, plan: null, prefillEmail: '', onSuccess: null };

window.openNIEVROXAuth = function(plan, prefillEmail) {
  window._NIEVROXAuthState.plan = plan || 'trial';
  window._NIEVROXAuthState.prefillEmail = prefillEmail || '';
  window._NIEVROXAuthState.open = true;
  if (window._NIEVROXAuthRender) window._NIEVROXAuthRender();
};

      localStorage.setItem('token', res.token);
await new Promise(r => setTimeout(r, 500));
window.location.href = "NIEVROX-UserDashboard.html";

// ─────────────────────────────────────────────────────────────────────────────
// PHASE-1: AUTH FLOW CONTROLLER
// Manages: auth modal open/close → onboarding wizard → dashboard redirect
// ─────────────────────────────────────────────────────────────────────────────
function NIEVROXAuthFlow() {
  const [open,          setOpen]          = React.useState(false);
  const [showOnboarding, setShowOnboarding] = React.useState(false);
  const [user,          setUser]          = React.useState(null);
  const [appLoading,    setAppLoading]    = React.useState(false);

  // Allow external JS to open the modal
  window._NIEVROXAuthRender = () => {
    setOpen(window._NIEVROXAuthState.open);
  };

  // Called after signup or login succeeds — checks onboarding state
  function handleAuthSuccess(u) {
    setUser(u);
    setOpen(false);
    window._NIEVROXAuthState.open = false;
    setAppLoading(true);

    // apiCall auto-attaches Authorization: Bearer token from localStorage
    apiCall('GET', '/onboarding/state')
      .then(data => {
        setAppLoading(false);
        // Dashboard handles onboarding wizard — always redirect there
        window.location.href = 'NIEVROX-UserDashboard.html';
      })
      .catch(() => {
        // Backend unreachable — dashboard handles onboarding itself, redirect there directly
        setAppLoading(false);
        window.location.href = 'NIEVROX-UserDashboard.html';
      });
  }

  function handleOnboardingComplete() {
    window.location.href = 'NIEVROX-UserDashboard.html';
  }

  // Loading spinner while checking onboarding state
  if (appLoading) {
    return React.createElement('div', {
      style: { position: 'fixed', inset: 0, zIndex: 9999, display: 'flex', flexDirection: 'column',
               alignItems: 'center', justifyContent: 'center',
               background: 'rgba(0,0,0,0.92)', backdropFilter: 'blur(14px)' }
    },
      React.createElement('div', {
        style: { width: 48, height: 48, border: '3px solid rgba(168,85,247,0.25)',
                 borderTopColor: '#A855F7', borderRadius: '50%',
                 animation: 'spin 0.8s linear infinite', marginBottom: 18 }
      }),
      React.createElement('p', {
        style: { color: 'rgba(200,200,220,0.6)', fontSize: 13,
                 fontFamily: "'Space Grotesk',sans-serif" }
      }, 'Setting up your workspace…')
    );
  }

  if (!open && !showOnboarding) return null;

  if (showOnboarding && user) {
    return React.createElement(NIEVROXOnboardingWizard, {
      user, plan: window._NIEVROXAuthState.plan, onComplete: handleOnboardingComplete
    });
  }

  if (open) {
    return React.createElement(NIEVROXAuthModal, { onAuthSuccess: handleAuthSuccess });
  }

  return null;
}
